<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HXRMXS Engine</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, monospace; background: #0d0d0d; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
  header { padding: 12px 20px; background: #1a1a1a; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
  header h1 { font-size: 14px; font-weight: 400; color: #888; letter-spacing: 1px; }
  #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .msg { max-width: 80%; padding: 12px 16px; border-radius: 8px; line-height: 1.5; font-size: 14px; white-space: pre-wrap; }
  .msg.user { align-self: flex-end; background: #1e3a5f; color: #c8dfff; }
  .msg.assistant { align-self: flex-start; background: #1a1a2e; color: #d0d0ff; border: 1px solid #2a2a4e; }
  .msg.error { align-self: center; background: #3a1a1a; color: #ff8888; border: 1px solid #5a2a2a; }
  #input-area { display: flex; gap: 8px; padding: 12px 20px; background: #1a1a1a; border-top: 1px solid #333; }
  #input { flex: 1; background: #222; border: 1px solid #444; color: #e0e0e0; padding: 10px 14px; border-radius: 6px; font-size: 14px; outline: none; }
  #input:focus { border-color: #666; }
  #send { background: #2a5a8f; color: #fff; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; min-width: 70px; }
  #send:hover { background: #3a7abf; }
  #send:disabled { opacity: 0.4; cursor: not-allowed; }
  .trace-toggle { color: #666; cursor: pointer; font-size: 12px; margin-top: 8px; user-select: none; }
  .trace-toggle:hover { color: #999; }
  .trace { display: none; margin-top: 8px; padding: 8px; background: #111; border: 1px solid #222; border-radius: 4px; font-size: 11px; color: #888; max-height: 300px; overflow-y: auto; }
  .trace pre { margin: 0; white-space: pre-wrap; }
  .rating { display: flex; gap: 4px; margin-top: 8px; }
  .rating button { background: #222; border: 1px solid #444; color: #888; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; }
  .rating button:hover { background: #333; color: #fff; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #555; border-top: 2px solid #aaa; border-radius: 50%; animation: spin .8s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<header><h1>HXRMXS UNO ENGINE</h1><span id="status" style="font-size:11px;color:#555;">ready</span></header>
<div id="chat"></div>
<div id="input-area">
  <input id="input" type="text" placeholder="Talk to the graph..." autofocus>
  <button id="send">Send</button>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const statusEl = document.getElementById('status');
let lastGraphId = null;
let lastResult = null;
let threadId = 'web-' + Date.now();
let loading = false;

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function addTrace(data) {
  const traceDiv = document.createElement('div');
  const toggle = document.createElement('div');
  toggle.className = 'trace-toggle';
  toggle.textContent = '[ trace ]';
  traceDiv.appendChild(toggle);
  const trace = document.createElement('div');
  trace.className = 'trace';
  trace.innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
  traceDiv.appendChild(trace);
  toggle.onclick = () => { trace.style.display = trace.style.display === 'block' ? 'none' : 'block'; };
  chat.appendChild(traceDiv);
  chat.scrollTop = chat.scrollHeight;
}

function addRating(runId) {
  const div = document.createElement('div');
  div.className = 'rating';
  [-2,-1,0,1,2].forEach(score => {
    const labels = {-2:'Terrible',-1:'Bad',0:'Meh',1:'Good',2:'Great'};
    const btn = document.createElement('button');
    btn.textContent = labels[score];
    btn.onclick = async () => {
      try {
        await fetch('/api/feedback', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({graph_mythought_id:runId, score}) });
        btn.style.opacity = '0.4';
        btn.textContent += ' ✓';
      } catch(e) { console.error('feedback error', e); }
    };
    div.appendChild(btn);
  });
  chat.appendChild(div);
}

async function sendMessage(text) {
  if (loading || !text) return;
  loading = true;
  sendBtn.disabled = true;
  sendBtn.innerHTML = '<span class="spinner"></span>';
  statusEl.textContent = 'thinking...';

  addMsg('user', text);

  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 120000);

    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ thread_id: threadId, user_text: text }),
      signal: controller.signal
    });
    clearTimeout(timeout);

    if (!res.ok) {
      const errText = await res.text();
      throw new Error(res.status + ': ' + errText.slice(0,200));
    }

    const data = await res.json();
    if (data.error) throw new Error(data.error);

    addMsg('assistant', data.final_response || '(empty response)');
    addTrace({
      pathway: data.pathway || {},
      graph_mythought: data.graph_mythought || {},
    });

    lastGraphId = data.graph_mythought_id;
    lastResult = data;
    addRating(lastGraphId);

  } catch(e) {
    const msg = e.name === 'AbortError' ? 'Request timed out (120s). The API might be slow.' : 'Error: ' + e.message;
    addMsg('error', msg);
    console.error(e);
  }

  loading = false;
  sendBtn.disabled = false;
  sendBtn.textContent = 'Send';
  statusEl.textContent = 'ready';
  input.value = '';
  input.focus();
}

sendBtn.onclick = () => sendMessage(input.value);
input.onkeydown = (e) => { if (e.key === 'Enter') sendMessage(input.value); };
addMsg('assistant', 'Engine ready.');
</script>
</body>
</html>
